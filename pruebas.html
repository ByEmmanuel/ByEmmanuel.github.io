<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista con Círculos</title>
    <style>
        /* Estilos para mayor claridad en el ejemplo */
        ul {
            list-style: none;
            padding: 0;
            display: flex;
            flex-wrap: wrap;
        }

        .circulo {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background-color: #3498db;
            margin: 10px; /* Espacio entre los círculos */
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-weight: bold;
            font-size: 18px;
        }
    </style>
</head>
<body>

    <ul>
        <li>
            <div class="circulo">1</div>
            <div class="circulo">2</div>
        </li>
        <li>
            <div class="circulo">3</div>
            <div class="circulo">4</div>
        </li>
    </ul>

</body>
</html>
