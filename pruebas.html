<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ventana Emergente</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
        }

        .ventana-emergente {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            justify-content: center;
            align-items: center;
        }

        .contenido-ventana {
            background: #fff;
            padding: 20px;
            border-radius: 10px;
        }

        a {
            color: #007BFF;
            text-decoration: none;
            cursor: pointer;
        }

        a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <a href="#" onclick="mostrarVentana()">Haz clic aquí</a>

    <div class="ventana-emergente" id="ventanaEmergente">
        <div class="contenido-ventana">
            <p>Contenido de la ventana emergente</p>
            <button onclick="cerrarVentana()">Cerrar</button>
        </div>
    </div>

    <script>
        function mostrarVentana() {
            document.getElementById('ventanaEmergente').style.display = 'flex';
        }

        function cerrarVentana() {
            document.getElementById('ventanaEmergente').style.display = 'none';
        }
    </script>
</body>
</html>
